<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Number Guessing Game</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --card: #111827;
        --panel: #1e293b;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #c084fc;
        --accent-strong: #a78bfa;
        --success: #4ade80;
        --danger: #fb7185;
        --radius: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 26%),
                    linear-gradient(180deg, #020617 0%, #0f172a 100%);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .game-card {
        width: min(520px, 100%);
        background: rgba(15, 23, 42, 0.96);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: var(--radius);
        box-shadow: 0 32px 80px rgba(7, 12, 26, 0.45);
        padding: 32px;
      }

      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      #date {
        font-size: 0.95rem;
        color: var(--muted);
        margin-top: 0;
        margin-bottom: 24px;
      }

      h3 {
        margin: 0 0 12px;
        color: #ffffff;
      }

      .level-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .level-group label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(148, 163, 184, 0.08);
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }

      .level-group input[type="radio"] {
        accent-color: var(--accent);
        cursor: pointer;
      }

      .level-group input[type="radio"]:checked + label,
      .level-group label:hover {
        border-color: rgba(56, 189, 248, 0.48);
        background: rgba(56, 189, 248, 0.12);
        transform: translateY(-1px);
      }

      .button-row,
      .stats-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button,
      input[type="text"] {
        border: none;
        border-radius: 14px;
        font: inherit;
      }

      button {
        padding: 14px 18px;
        cursor: pointer;
        color: #0f172a;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        box-shadow: 0 14px 28px rgba(56, 189, 248, 0.18);
        transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 18px 32px rgba(56, 189, 248, 0.28);
      }

      #guess {
        flex: 1 1 150px;
        min-width: 120px;
        padding: 14px 16px;
        background: rgba(148, 163, 184, 0.08);
        color: var(--text);
        outline: 1px solid rgba(148, 163, 184, 0.18);
      }

      #msg {
        min-height: 44px;
        margin: 16px 0 8px;
        padding: 18px 16px;
        border-radius: 18px;
        background: rgba(30, 41, 59, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .stats-panel,
      .leaderboard-panel {
        background: rgba(30, 41, 59, 0.88);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        margin-top: 20px;
      }

      .stats-panel p,
      .leaderboard-panel li {
        margin: 8px 0;
        color: var(--text);
      }

      .stats-panel p:first-child {
        margin-top: 0;
      }

      ol {
        padding-left: 20px;
        margin: 0;
      }

      li[name="leaderboard"] {
        padding: 10px 12px;
        margin-bottom: 8px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.12);
        list-style-position: inside;
      }
    </style>
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="game-card">
      <p id="date"></p>

      <div class="top-row">
        <div>
          <h3>Level</h3>
          <div class="level-group">
            <input type="radio" name="level" id="e" value="3" checked><label for="e">Easy</label>
            <input type="radio" name="level" id="m" value="10"><label for="m">Medium</label>
            <input type="radio" name="level" id="h" value="100"><label for="h">Hard</label>
          </div>
        </div>

        <button id="playBtn">Play</button>
      </div>

      <h3 id="msg">Select a Level</h3>

      <div class="button-row">
        <input type="text" id="guess" placeholder="Enter your guess">
        <button id="guessBtn" disabled>Guess</button>
        <button id="giveUpBtn" disabled>Give Up</button>
      </div>

      <div class="stats-panel">
        <h3>Stats</h3>
        <p id="firstTryWins">First try wins: 0</p>
        <p id="wins">Total wins: 0</p>
        <p id="avgScore">Average Score: </p>
        <p id="fastest">Fastest Game: </p>
        <p id="avgTime">Average Time: </p>
      </div>

      <div class="leaderboard-panel">
        <h3>Leaderboard</h3>
        <ol>
          <li name="leaderboard">100</li>
          <li name="leaderboard">100</li>
          <li name="leaderboard">100</li>
        </ol>
      </div>
    </main>
  </body>
</html>
